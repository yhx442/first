:root {

* { margin:0; padding:0; box-sizing:border-box; }
body {

.header {

}
.big-number .amount.win { color: var(--win); }
.big-number .amount.lose { color: var(--lose); }
.big-number .amount.empty { color: var(--gray); }
.big-number .subtitle {
  font-size: 14px;
  color: var(--text-secondary);

}

.message-card {

  padding: 20px;

  margin: 12px 0;
}
.message-card .emoji { font-size: 36px; margin-bottom: 8px; }
.message-card .msg-text {
  font-size: 15px;
  color: #831843;
  line-height: 1.8;
  font-weight: 500;
}

.stats-row {

  gap: 10px;
  margin: 12px 0 20px;
}
.stat-item {
  flex: 1;
  background: #fff;
  border-radius: 12px;
  padding: 14px 8px;
  text-align: center;

if ('serviceWorker' in navigator) {
  var swCode = 'self.addEventListener("install",function(e){e.waitUntil(caches.open("mj-v1").then(function(c){return c.addAll(["./"]);}));self.skipWaiting();});' +
    'self.addEventListener("activate",function(e){e.waitUntil(self.clients.claim());});' +
    'self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request);}));});';
  var swBlob = new Blob([swCode], {type:'application/javascript'});
  var swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

// ====== 数据层 ======
var STORAGE_KEY = 'mahjong_records';

function loadRecords() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw).records || [] : [];
  } catch (e) {
    return [];
  }
}

function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ records: records }));
}

function getTodayRecord() {
  var today = new Date().toISOString().slice(0, 10);
  return loadRecords().find(function(r) { return r.date === today; }) || null;
}

function saveTodayRecord(amount, message) {
  var today = new Date().toISOString().slice(0, 10);
  var records = loadRecords();
  var idx = records.findIndex(function(r) { return r.date === today; });
  var entry = { date: today, amount: amount, message: message };
  if (idx >= 0) {
    records[idx] = entry;
  } else {
    records.push(entry);
  }
  records.sort(function(a, b) { return b.date.localeCompare(a.date); });
  saveRecords(records);
  return entry;
}

function getStats() {
  var records = loadRecords();
  var now = new Date();
  var todayStr = now.toISOString().slice(0, 10);
  var dayOfWeek = now.getDay();
  var mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  var monday = new Date(now);
  monday.setDate(now.getDate() - mondayOffset);
  var weekStart = monday.toISOString().slice(0, 10);
  var monthStart = todayStr.slice(0, 7) + '-01';
  var weekTotal = 0, monthTotal = 0, winCount = 0, totalCount = 0;
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    if (r.date >= weekStart) weekTotal += r.amount;
    if (r.date >= monthStart) monthTotal += r.amount;
    totalCount++;
    if (r.amount > 0) winCount++;
  }
  var winRate = totalCount > 0 ? Math.round((winCount / totalCount) * 100) : null;
  return { weekTotal: weekTotal, monthTotal: monthTotal, winRate: winRate };
}

function getTodayStr() {
  var now = new Date();
  var days = ['日','一','二','三','四','五','六'];
  return now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日 周' + days[now.getDay()];
}

    '妈，输了{amount}没事的。人生就像麻将，起起落落很正常🎢 重要的是妈妈每天都开开心心的！',
    '{amount}块换不来妈妈的快乐。早点休息妈，明天又是全新的一天，运气也会全新的✨ 爱你~'
  ]
};

function pickMessage(amount) {
  var tier;
  if (amount >= 200) tier = 'bigWin';
  else if (amount > 0) tier = 'smallWin';
  else if (amount === 0) tier = 'breakEven';
  else if (amount >= -199) tier = 'smallLose';
  else tier = 'bigLose';
  var pool = MESSAGES[tier];
  var idx = Math.floor(Math.random() * pool.length);
  return pool[idx].replace('{amount}', String(Math.abs(amount)));
}

function getEmoji(amount) {
  if (amount >= 200) return '🥳';
  if (amount > 0) return '😊';
  if (amount === 0) return '😌';
  if (amount >= -199) return '🤗';
  return '💪';
}

// ====== 渲染 ======
function renderHome() {
  var record = getTodayRecord();
  var todayEl = document.getElementById('todayAmount');
  var subtitleEl = document.getElementById('todaySubtitle');
  var msgCard = document.getElementById('messageCard');
  var msgEmoji = document.getElementById('msgEmoji');
  var msgText = document.getElementById('msgText');

  if (record) {
    var amt = record.amount;
    todayEl.textContent = amt >= 0 ? '+' + amt : String(amt);
    todayEl.className = 'amount ' + (amt > 0 ? 'win' : amt < 0 ? 'lose' : 'empty');
    var desc = amt > 0 ? '今日净胜 ¥' + amt + ' · 盈利日 ✨'
             : amt < 0 ? '今日净输 ¥' + Math.abs(amt) + ' · 休整日 🌙'
             : '今日打平 · 养生局 🍵';
    subtitleEl.textContent = desc;
    msgCard.style.display = 'block';
    msgEmoji.textContent = getEmoji(amt);
    msgText.textContent = record.message;
  } else {
    todayEl.textContent = '—';
    todayEl.className = 'amount empty';
    subtitleEl.textContent = '今天还没记录哦~';
    msgCard.style.display = 'none';
  }

  var stats = getStats();
  setStat('statWeek', stats.weekTotal);
  setStat('statMonth', stats.monthTotal);
  setStat('statRate', stats.winRate !== null ? stats.winRate + '%' : null);
}

function setStat(id, value) {
  var el = document.getElementById(id);
  if (value === null || value === undefined) {
    el.textContent = '—';
    el.className = 'stat-value neutral';
    return;
  }
  if (typeof value === 'string') {
    el.textContent = value;
    el.className = 'stat-value neutral';
    return;
  }
  el.textContent = value >= 0 ? '+' + value : String(value);
  el.className = 'stat-value ' + (value > 0 ? 'win' : value < 0 ? 'lose' : 'neutral');
}

// ====== Tab 切换 ======
function switchTab(tab) {
  document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelector('.tab-item[data-tab="' + tab + '"]').classList.add('active');
  document.getElementById('page' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  if (tab === 'home') renderHome();
  else if (tab === 'history') renderHistory();
  else if (tab === 'export') renderExport();
}

document.querySelectorAll('.tab-item').forEach(function(btn) {
  btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
});

// ====== 记账面板 ======
var sheetState = { win: true, amount: '' };
var overlay = document.getElementById('sheetOverlay');
var choiceWin = document.getElementById('choiceWin');
var choiceLose = document.getElementById('choiceLose');
var amountDisplay = document.getElementById('amountDisplay');
var numPad = document.getElementById('numPad');
var btnSave = document.getElementById('btnSave');

document.getElementById('btnRecord').addEventListener('click', function() {
  var existing = getTodayRecord();
  if (existing) {
    sheetState.win = existing.amount >= 0;
    sheetState.amount = String(Math.abs(existing.amount));
  } else {
    sheetState.win = true;
    sheetState.amount = '';
  }
  updateSheetUI();
  overlay.classList.add('open');
});

overlay.addEventListener('click', function(e) {
  if (e.target === overlay) overlay.classList.remove('open');
});

choiceWin.addEventListener('click', function() { sheetState.win = true; updateSheetUI(); });
choiceLose.addEventListener('click', function() { sheetState.win = false; updateSheetUI(); });

function updateSheetUI() {
  choiceWin.className = 'choice-btn' + (sheetState.win ? ' selected-win' : '');
  choiceLose.className = 'choice-btn' + (!sheetState.win ? ' selected-lose' : '');
  var prefix = sheetState.win ? '' : '-';
  amountDisplay.textContent = '¥' + prefix + (sheetState.amount || '0');
  btnSave.disabled = !sheetState.amount || sheetState.amount === '0';
}

function buildNumPad() {
  var keys = ['1','2','3','4','5','6','7','8','9','清','0','⌫'];
  keys.forEach(function(key) {
    var btn = document.createElement('button');
    btn.className = 'num-key' + (key === '清' || key === '⌫' ? ' action' : '');
    btn.textContent = key;
    btn.addEventListener('click', function() { handleNumKey(key); });
    numPad.appendChild(btn);
  });
}

function handleNumKey(key) {
  if (key === '清') {
    sheetState.amount = '';
  } else if (key === '⌫') {
    sheetState.amount = sheetState.amount.slice(0, -1);
  } else {
    if (sheetState.amount.length >= 5) return;
    sheetState.amount += key;
  }
  updateSheetUI();
}

btnSave.addEventListener('click', function() {
  var rawAmount = parseInt(sheetState.amount, 10) || 0;
  var finalAmount = sheetState.win ? rawAmount : -rawAmount;
  var message = pickMessage(finalAmount);
  saveTodayRecord(finalAmount, message);
  overlay.classList.remove('open');
  renderHome();
});

buildNumPad();

// ====== 历史 ======
function renderHistory() {
  var records = loadRecords();
  var listEl = document.getElementById('historyList');
  var emptyEl = document.getElementById('historyEmpty');

  if (records.length === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }

  emptyEl.style.display = 'none';
  listEl.innerHTML = records.map(function(r) {
    var isWin = r.amount > 0;
    var isLose = r.amount < 0;
    var cls = isWin ? 'win' : isLose ? 'lose' : '';
    var prefix = r.amount >= 0 ? '+' : '';
    var label = r.amount > 0 ? '赢' : r.amount < 0 ? '输' : '平';
    return '<div class="history-item-wrap">' +
      '<div class="history-item" data-date="' + r.date + '" onclick="toggleHistoryDetail(this)">' +
        '<div>' +
          '<div class="hi-date">' + formatDate(r.date) + '</div>' +
          '<div style="font-size:11px;color:#9CA3AF;margin-top:2px">' + label + ' ¥' + Math.abs(r.amount) + '</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span class="hi-amount ' + cls + '">' + prefix + r.amount + '</span>' +
          '<span class="arrow" style="font-size:12px;color:#ccc;">▶</span>' +
        '</div>' +
      '</div>' +
      '<div class="history-detail" id="detail-' + r.date + '">' + r.message + '</div>' +
    '</div>';
  }).join('');
}

function formatDate(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  var days = ['日','一','二','三','四','五','六'];
  return (d.getMonth() + 1) + '月' + d.getDate() + '日 周' + days[d.getDay()];
}

function toggleHistoryDetail(el) {
  var date = el.dataset.date;
  var detail = document.getElementById('detail-' + date);
  var arrow = el.querySelector('.arrow');
  if (detail) {
    var isOpen = detail.classList.contains('open');
    document.querySelectorAll('.history-detail.open').forEach(function(d) { d.classList.remove('open'); });
    document.querySelectorAll('.history-item .arrow').forEach(function(s) { s.textContent = '▶'; });
    if (!isOpen) {
      detail.classList.add('open');
      if (arrow) arrow.textContent = '▼';
    }
  }
}

// ====== 导出 ======
function renderExport() {
  var records = loadRecords();
  var previewEl = document.getElementById('exportPreview');
  var btnCopy = document.getElementById('btnCopy');
  var btnDownload = document.getElementById('btnDownload');

  if (records.length === 0) {
    previewEl.textContent = '还没有记录，无法导出~';
    btnCopy.disabled = true;
    btnDownload.disabled = true;
    previewEl._text = '';
    return;
  }

  btnCopy.disabled = false;
  btnDownload.disabled = false;

  var lines = ['🏮 麻将小账本', ''];
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    var label = r.amount > 0 ? '赢' : r.amount < 0 ? '输' : '平';
    var prefix = r.amount >= 0 ? '+' : '';
    lines.push(r.date + '  ' + label + ' ¥' + Math.abs(r.amount) + '  |  ' + r.message);
  }
  var text = lines.join('\n');
  previewEl.textContent = text;
  previewEl._text = text;
}

document.getElementById('btnCopy').addEventListener('click', function() {
  var text = document.getElementById('exportPreview')._text || '';
  if (!text) return;
  try {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('btnCopy');
      var orig = btn.textContent;
      btn.textContent = '✅ 已复制！';
      btn.style.background = '#F0FDF4';
      btn.style.borderColor = '#22C55E';
      btn.style.color = '#22C55E';
      setTimeout(function() {
        btn.textContent = orig;
        btn.style.background = '#fff';
        btn.style.borderColor = 'var(--rose)';
        btn.style.color = 'var(--rose)';
      }, 2000);
    });
  } catch (e) {
    alert('复制失败，请长按文本手动复制');
  }
});

document.getElementById('btnDownload').addEventListener('click', function() {
  var text = document.getElementById('exportPreview')._text || '';
  if (!text) return;
  var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '麻将小账本_' + new Date().toISOString().slice(0, 10) + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// ====== 初始化 ======
document.getElementById('headerDate').textContent = getTodayStr();
renderHome();
</script>
