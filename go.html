<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>围棋 — 业余一段</title>
<style>
  :root {
    --bg: #4A3728;
    --board: #DCB468;
    --line: #5a4a2a;
    --text: #E8D5B7;
    --accent: #C9A96E;
    --panel-bg: #3C2A1C;
    --btn-bg: #5C3D2E;
    --btn-hover: #6D4E3F;
    --btn-disabled: #3A2A1E;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Serif SC", "SimSun", "STSong", serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
  }

  .top-bar {
    width: 100%; max-width: 1000px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    font-size: 15px;
  }
  .top-bar .turn-indicator { font-size: 18px; font-weight: bold; }
  .top-bar .captures { font-size: 14px; opacity: 0.85; }
  .black-stone-mini { display: inline-block; width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 5px 5px, #555, #111); vertical-align: middle; margin-right: 4px; }
  .white-stone-mini { display: inline-block; width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 5px 5px, #fff, #ccc); vertical-align: middle; margin-right: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3); }

  .main-area {
    display: flex; gap: 20px; width: 100%; max-width: 1000px;
    padding: 0 20px 20px; flex: 1;
  }

  .board-container {
    flex: 0 0 auto;
    background: #3A1F0D;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.05);
  }
  canvas { display: block; cursor: pointer; border-radius: 4px; }

  .sidebar {
    flex: 0 0 240px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .panel {
    background: var(--panel-bg);
    border-radius: 8px; padding: 14px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .panel h3 {
    font-size: 14px; margin-bottom: 10px;
    color: var(--accent); letter-spacing: 2px;
  }

  .btn {
    display: block; width: 100%; padding: 10px;
    margin-bottom: 8px;
    background: var(--btn-bg);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    font-size: 14px; font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--btn-hover); }
  .btn:disabled { background: var(--btn-disabled); color: #666; cursor: not-allowed; }
  .btn:last-child { margin-bottom: 0; }

  .joseki-cat {
    background: var(--btn-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px; padding: 8px 10px;
    margin-bottom: 6px; cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .joseki-cat:hover { background: var(--btn-hover); }
  .joseki-cat.active { border-color: var(--accent); }
  .joseki-var {
    background: rgba(0,0,0,0.2);
    border-radius: 4px; padding: 8px; margin-top: 4px;
  }
  .joseki-var canvas { width: 100%; height: auto; cursor: default; }

  .score-panel {
    font-size: 13px; line-height: 1.8;
  }
  .score-panel .score-row { display: flex; justify-content: space-between; }
  .score-panel .winner { font-weight: bold; color: var(--accent); margin-top: 6px; }

  .bottom-bar {
    width: 100%; max-width: 1000px;
    padding: 0 20px 16px;
    font-size: 13px; text-align: center; opacity: 0.7;
  }

  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  .loading-overlay .progress-bar {
    width: 300px; height: 8px;
    background: #333; border-radius: 4px; overflow: hidden;
    margin-top: 16px;
  }
  .loading-overlay .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 4px; transition: width 0.3s;
  }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 800px) {
    .main-area { flex-direction: column; align-items: center; }
    .sidebar { flex: 0 0 auto; width: 100%; max-width: 400px; flex-direction: row; flex-wrap: wrap; }
    .sidebar .panel { flex: 1; min-width: 140px; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <p>加载 KataGo 模型中...</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <p style="font-size:12px;opacity:0.6;margin-top:8px" id="loadingStatus"></p>
</div>

<div class="top-bar">
  <span class="turn-indicator" id="turnIndicator">🔸 您的回合（黑）</span>
  <span class="captures">
    <span class="black-stone-mini"></span> 提子: <span id="capturesB">0</span>
    &nbsp;&nbsp;
    <span class="white-stone-mini"></span> 提子: <span id="capturesW">0</span>
    &nbsp;&nbsp; 手数: <span id="moveCount">0</span>
  </span>
</div>

<div class="main-area">
  <div class="board-container">
    <canvas id="board"></canvas>
  </div>

  <div class="sidebar">
    <div class="panel">
      <h3>对局控制</h3>
      <button class="btn" id="btnPass">停一手 (Pass)</button>
      <button class="btn" id="btnResign">认输</button>
      <button class="btn" id="btnUndo">悔棋</button>
      <button class="btn" id="btnScore">形势判断</button>
      <button class="btn" id="btnNew" style="margin-top:12px;border-color:var(--accent)">新局</button>
    </div>

    <div class="panel">
      <h3>定式参考</h3>
      <div id="josekiList"></div>
    </div>

    <div class="panel score-panel" id="scorePanel" style="display:none">
      <h3>形势判断</h3>
      <div id="scoreContent"></div>
    </div>
  </div>
</div>

<div class="bottom-bar" id="statusBar">点击棋盘落子</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script>
// ===== Constants =====
const BOARD_SIZE = 19;
const EMPTY = 0, BLACK = 1, WHITE = 2;
const STAR_POINTS_19 = [
  [3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]
];

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

let cellSize, padding, boardPixelSize;

function calcSizes() {
  const maxSize = Math.min(window.innerWidth - 300, window.innerHeight - 180, 660);
  cellSize = Math.floor(maxSize / (BOARD_SIZE + 1));
  padding = cellSize;
  boardPixelSize = cellSize * (BOARD_SIZE - 1);
  canvas.width = boardPixelSize + padding * 2;
  canvas.height = boardPixelSize + padding * 2;
}
calcSizes();

// ===== Board State =====
// 19x19 grid: 0=empty, 1=black, 2=white
let board = Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(EMPTY));
let moveHistory = [];       // [{row, col, color, captures: [], prevBoard: snapshot}]
let currentPlayer = BLACK;
let gameState = 'IDLE';     // IDLE | PLAYING | SCORING
let captures = { [BLACK]: 0, [WHITE]: 0 };
let lastMove = null;        // {row, col} or null
let koPoint = null;         // {row, col} or null

// ===== Group & Liberty Utilities =====

/** Get all stones in a connected group starting from (row, col) */
function getGroup(row, col) {
  const color = board[row][col];
  if (color === EMPTY) return [];
  const group = [];
  const visited = new Set();
  const stack = [[row, col]];

  while (stack.length > 0) {
    const [r, c] = stack.pop();
    const key = r * BOARD_SIZE + c;
    if (visited.has(key)) continue;
    visited.add(key);
    group.push([r, c]);

    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE &&
          board[nr][nc] === color && !visited.has(nr * BOARD_SIZE + nc)) {
        stack.push([nr, nc]);
      }
    }
  }
  return group;
}

/** Count liberties for a group given its stones */
function countLiberties(group) {
  const liberties = new Set();
  for (const [r, c] of group) {
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE &&
          board[nr][nc] === EMPTY) {
        liberties.add(nr * BOARD_SIZE + nc);
      }
    }
  }
  return liberties.size;
}

/** Get all adjacent opposing groups to (row, col) */
function getAdjacentOpponentGroups(row, col) {
  const myColor = board[row][col];
  const seen = new Set();
  const groups = [];

  for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
    const nr = row + dr, nc = col + dc;
    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE &&
        board[nr][nc] !== EMPTY && board[nr][nc] !== myColor) {
      const key = nr * BOARD_SIZE + nc;
      if (!seen.has(key)) {
        const group = getGroup(nr, nc);
        for (const [gr, gc] of group) seen.add(gr * BOARD_SIZE + gc);
        groups.push(group);
      }
    }
  }
  return groups;
}

/** Deep-clone the board */
function cloneBoard(b) {
  return b.map(row => [...row]);
}

/** Compute a positional hash for ko detection */
function boardHash(b) {
  let h = 0;
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      h = ((h << 5) - h) + b[r][c];
      h |= 0;
    }
  }
  return h;
}

// ===== Move Validation & Execution =====

function isValidMove(row, col, color) {
  if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return false;
  if (board[row][col] !== EMPTY) return false;

  // Ko check
  if (koPoint && koPoint.row === row && koPoint.col === col) return false;

  // Simulate placement
  const prevBoard = cloneBoard(board);
  board[row][col] = color;

  // Remove captured opponent stones
  const adjOppGroups = getAdjacentOpponentGroups(row, col);
  let capturedAny = false;
  const capturedStones = [];
  for (const group of adjOppGroups) {
    if (countLiberties(group) === 0) {
      capturedAny = true;
      for (const [gr, gc] of group) {
        capturedStones.push({ row: gr, col: gc, color: board[gr][gc] });
        board[gr][gc] = EMPTY;
      }
    }
  }

  // Suicide check
  const myGroup = getGroup(row, col);
  const alive = countLiberties(myGroup) > 0;

  // Restore board
  board = prevBoard;

  return alive;
}

function executeMove(row, col, color) {
  const prevBoard = cloneBoard(board);
  board[row][col] = color;

  const capturedStones = [];
  const adjOppGroups = getAdjacentOpponentGroups(row, col);
  for (const group of adjOppGroups) {
    if (countLiberties(group) === 0) {
      for (const [gr, gc] of group) {
        capturedStones.push({ row: gr, col: gc, color: board[gr][gc] });
        board[gr][gc] = EMPTY;
      }
    }
  }

  captures[color] += capturedStones.length;

  // Update ko point: if we captured exactly 1 stone and placed 1 stone
  const oldKoPoint = koPoint ? { ...koPoint } : null;
  koPoint = (capturedStones.length === 1 &&
             getGroup(row, col).length === 1 &&
             countLiberties(getGroup(row, col)) === 1)
    ? { row: capturedStones[0].row, col: capturedStones[0].col }
    : null;

  moveHistory.push({
    row, col, color,
    captures: capturedStones,
    prevBoard,
    prevKoPoint: oldKoPoint
  });

  lastMove = { row, col };
  return capturedStones;
}

function undoLastTwoMoves() {
  if (moveHistory.length < 2) return false;
  // Undo AI move
  const aiMove = moveHistory.pop();
  if (aiMove.row >= 0) board[aiMove.row][aiMove.col] = EMPTY;
  for (const cap of aiMove.captures) {
    board[cap.row][cap.col] = cap.color;
  }
  captures[aiMove.color] -= aiMove.captures.length;

  // Undo player move
  const playerMove = moveHistory.pop();
  if (playerMove.row >= 0) board[playerMove.row][playerMove.col] = EMPTY;
  for (const cap of playerMove.captures) {
    board[cap.row][cap.col] = cap.color;
  }
  captures[playerMove.color] -= playerMove.captures.length;

  // Restore ko point and lastMove from previous state
  if (moveHistory.length > 0) {
    lastMove = { row: moveHistory[moveHistory.length - 1].row, col: moveHistory[moveHistory.length - 1].col };
  } else {
    lastMove = null;
  }
  koPoint = playerMove.prevKoPoint;

  return true;
}

// ===== Board Renderer =====
function boardToPixel(row, col) {
  return {
    x: padding + col * cellSize,
    y: padding + row * cellSize
  };
}

function pixelToBoard(px, py) {
  const col = Math.round((px - padding) / cellSize);
  const row = Math.round((py - padding) / cellSize);
  if (col < 0 || col >= BOARD_SIZE || row < 0 || row >= BOARD_SIZE) return null;
  // Check snap distance
  const { x, y } = boardToPixel(row, col);
  const dist = Math.sqrt((px - x) ** 2 + (py - y) ** 2);
  if (dist > cellSize * 0.45) return null;
  return { row, col };
}

function drawBoard() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Board background
  ctx.fillStyle = '#DCB468';
  ctx.fillRect(padding - cellSize * 0.5, padding - cellSize * 0.5,
    boardPixelSize + cellSize, boardPixelSize + cellSize);

  // Grid lines
  ctx.strokeStyle = '#4A3728';
  ctx.lineWidth = 1;
  for (let i = 0; i < BOARD_SIZE; i++) {
    const { x: x1, y: y1 } = boardToPixel(i, 0);
    const { x: x2, y: y2 } = boardToPixel(i, BOARD_SIZE - 1);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    const { x: x3, y: y3 } = boardToPixel(0, i);
    const { x: x4, y: y4 } = boardToPixel(BOARD_SIZE - 1, i);
    ctx.beginPath();
    ctx.moveTo(x3, y3);
    ctx.lineTo(x4, y4);
    ctx.stroke();
  }

  // Star points
  for (const [r, c] of STAR_POINTS_19) {
    const { x, y } = boardToPixel(r, c);
    ctx.fillStyle = '#4A3728';
    ctx.beginPath();
    ctx.arc(x, y, cellSize * 0.1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stones
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] === EMPTY) continue;
      const { x, y } = boardToPixel(r, c);
      drawStone(x, y, board[r][c]);
    }
  }

  // Last move marker
  if (lastMove) {
    const { x, y } = boardToPixel(lastMove.row, lastMove.col);
    ctx.fillStyle = board[lastMove.row][lastMove.col] === BLACK ? '#fff' : '#000';
    ctx.beginPath();
    ctx.arc(x, y, cellSize * 0.12, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStone(x, y, color) {
  const r = cellSize * 0.44;
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);

  if (color === BLACK) {
    grad.addColorStop(0, '#555');
    grad.addColorStop(1, '#111');
  } else {
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.6, '#f0f0f0');
    grad.addColorStop(1, '#c8c8c8');
  }

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();

  if (color === WHITE) {
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

// Hover preview
let hoverPos = null;
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  hoverPos = pixelToBoard(px, py);
  if (hoverPos && (board[hoverPos.row][hoverPos.col] !== EMPTY || gameState !== 'PLAYING' || currentPlayer !== BLACK)) {
    hoverPos = null;
  }
  drawBoard();
  if (hoverPos) {
    const { x, y } = boardToPixel(hoverPos.row, hoverPos.col);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.arc(x, y, cellSize * 0.44, 0, Math.PI * 2);
    ctx.fill();
  }
});

canvas.addEventListener('mouseleave', () => {
  hoverPos = null;
  drawBoard();
});

window.addEventListener('resize', () => {
  calcSizes();
  drawBoard();
});

// Initial render
drawBoard();

// ===== Self-test (run once on load) =====
function runTests() {
  // Test 1: Capture in corner
  executeMove(0, 0, WHITE);
  executeMove(0, 1, BLACK);
  const result = executeMove(1, 0, BLACK);
  console.assert(board[0][0] === EMPTY, 'white stone should be captured');
  console.assert(captures[BLACK] === 1, 'black should have 1 capture');

  resetGame();

  // Test 2: Ko detection — standard ko shape
  // . B W .
  // B . B W
  // . B W .
  // White captures at (1,1), capturing black at (1,2)
  executeMove(0, 1, BLACK); executeMove(0, 2, WHITE);
  executeMove(1, 0, BLACK); executeMove(1, 2, BLACK); executeMove(1, 3, WHITE);
  executeMove(2, 1, BLACK); executeMove(2, 2, WHITE);
  // Now (1,1) is empty, white captures
  executeMove(1, 1, WHITE);
  console.assert(board[1][2] === EMPTY, 'black stone should be captured in ko');
  console.assert(koPoint !== null, 'ko point should be set');
  console.assert(koPoint.row === 1 && koPoint.col === 2, 'ko point should be at captured stone position');
  console.assert(!isValidMove(1, 2, BLACK), 'ko prevents immediate recapture');
  console.assert(isValidMove(10, 10, BLACK), 'black can play elsewhere during ko');

  resetGame();

  // Test 3: Suicide prevention
  board[0][1] = WHITE;
  board[1][0] = WHITE;
  board[1][1] = WHITE;
  console.assert(!isValidMove(0, 0, BLACK), 'corner suicide should be illegal');

  // Capturing move with 0 own liberties is NOT suicide
  // Black at (0,1) surrounded by white on 3 sides, last liberty is (0,0)
  executeMove(0, 1, BLACK);
  executeMove(0, 2, WHITE);
  executeMove(1, 1, WHITE);
  executeMove(1, 0, WHITE);
  // White at (0,0) captures black at (0,1), gaining liberty → not suicide
  console.assert(isValidMove(0, 0, WHITE), 'capturing move should be valid despite 0 initial liberties');

  resetGame();
  console.log('All engine tests passed');
}

function resetGame() {
  board = Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(EMPTY));
  moveHistory = [];
  captures = { [BLACK]: 0, [WHITE]: 0 };
  lastMove = null;
  koPoint = null;
}

function calculateTerritory() {
  const territory = Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(null));
  const visited = Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(false));

  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] !== EMPTY || visited[r][c]) continue;

      const region = [];
      const borders = new Set();
      const stack = [[r, c]];

      while (stack.length > 0) {
        const [cr, cc] = stack.pop();
        if (visited[cr][cc]) continue;
        visited[cr][cc] = true;
        region.push([cr, cc]);

        for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const nr = cr + dr, nc = cc + dc;
          if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue;
          if (board[nr][nc] === EMPTY && !visited[nr][nc]) {
            stack.push([nr, nc]);
          } else if (board[nr][nc] !== EMPTY) {
            borders.add(board[nr][nc]);
          }
        }
      }

      if (borders.size === 1) {
        const owner = borders.values().next().value;
        for (const [pr, pc] of region) {
          territory[pr][pc] = owner;
        }
      }
    }
  }

  let blackTerritory = 0, whiteTerritory = 0;
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (territory[r][c] === BLACK) blackTerritory++;
      else if (territory[r][c] === WHITE) whiteTerritory++;
    }
  }

  let blackStones = 0, whiteStones = 0;
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] === BLACK) blackStones++;
      else if (board[r][c] === WHITE) whiteStones++;
    }
  }

  const blackScore = blackTerritory + blackStones + captures[BLACK];
  const whiteScore = whiteTerritory + whiteStones + captures[WHITE] + 7.5; // komi

  return { blackTerritory, whiteTerritory, blackScore, whiteScore, territory };
}

function endGame() {
  gameState = 'SCORING';
  const result = calculateTerritory();

  drawBoard();
  // Shade territory
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (result.territory[r][c]) {
        const { x, y } = boardToPixel(r, c);
        ctx.fillStyle = result.territory[r][c] === BLACK
          ? 'rgba(0,0,0,0.15)'
          : 'rgba(255,255,255,0.2)';
        ctx.fillRect(x - cellSize * 0.4, y - cellSize * 0.4,
          cellSize * 0.8, cellSize * 0.8);
      }
    }
  }

  const diff = result.blackScore - result.whiteScore;
  const winner = diff > 0 ? '黑棋' : '白棋';
  const margin = Math.abs(diff).toFixed(1);

  document.getElementById('scoreContent').innerHTML = `
    <div class="score-row"><span>黑棋</span><span>${result.blackScore.toFixed(1)} 子</span></div>
    <div class="score-row"><span>白棋</span><span>${result.whiteScore.toFixed(1)} 子</span></div>
    <div class="score-row" style="margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.15)">
      <span>贴目</span><span>7.5 目</span>
    </div>
    <div class="winner">${winner}胜 ${margin} 子</div>
  `;
  document.getElementById('scorePanel').style.display = 'block';

  updateUI();
  setStatus(`对局结束 — ${winner}胜 ${margin} 子`);
}

function drawJosekiDiagram(canvas, sequence) {
  const ctx = canvas.getContext('2d');
  const size = 19;
  const cs = Math.floor(canvas.width / (size + 1));
  const pad = cs;

  ctx.fillStyle = '#DCB468';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#8B7355';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < size; i++) {
    ctx.beginPath();
    ctx.moveTo(pad, pad + i * cs);
    ctx.lineTo(pad + (size - 1) * cs, pad + i * cs);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pad + i * cs, pad);
    ctx.lineTo(pad + i * cs, pad + (size - 1) * cs);
    ctx.stroke();
  }

  let minR = 19, maxR = 0, minC = 19, maxC = 0;
  for (const [r, c] of sequence) {
    minR = Math.min(minR, r); maxR = Math.max(maxR, r);
    minC = Math.min(minC, c); maxC = Math.max(maxC, c);
  }

  for (let i = 0; i < sequence.length; i++) {
    const [r, c] = sequence[i];
    const x = pad + c * cs;
    const y = pad + r * cs;
    const color = i % 2 === 0 ? BLACK : WHITE;
    const rad = cs * 0.42;

    const grad = ctx.createRadialGradient(x - rad * 0.3, y - rad * 0.3, rad * 0.1, x, y, rad);
    if (color === BLACK) {
      grad.addColorStop(0, '#555');
      grad.addColorStop(1, '#111');
    } else {
      grad.addColorStop(0, '#fff');
      grad.addColorStop(1, '#c8c8c8');
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = color === BLACK ? '#fff' : '#000';
    ctx.font = `${Math.floor(cs * 0.4)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i + 1, x, y);
  }
}

  if (aiModel) {
    return await aiGetMoveNeural();
  } else {
    return await aiGetMoveMCTS();
  }
}

async function aiGetMoveNeural() {
  const myColor = WHITE;
  const oppColor = BLACK;
  const input = new Float32Array(3 * BOARD_SIZE * BOARD_SIZE);

  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const idx = r * BOARD_SIZE + c;
      input[idx] = board[r][c] === myColor ? 1 : 0;
      input[BOARD_SIZE * BOARD_SIZE + idx] = board[r][c] === oppColor ? 1 : 0;
      input[2 * BOARD_SIZE * BOARD_SIZE + idx] = board[r][c] === EMPTY ? 1 : 0;
    }
  }

  const tensor = tf.tensor4d(input, [1, BOARD_SIZE, BOARD_SIZE, 3]);
  const output = aiModel.predict(tensor);
  const policy = Array.from(output.dataSync());
  tensor.dispose();
  output.dispose();

  const candidates = [];
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const idx = r * BOARD_SIZE + c;
      if (isValidMove(r, c, WHITE)) {
        candidates.push({ row: r, col: c, prob: policy[idx] });
      }
    }
  }
  candidates.push({ row: -1, col: -1, prob: policy[361] });

  candidates.sort((a, b) => b.prob - a.prob);

  const TOP_K = 15;
  const TEMPERATURE = 1.2;
  const topK = candidates.slice(0, TOP_K);

  const maxProb = Math.max(...topK.map(m => m.prob));
  const expProbs = topK.map(m => Math.exp((m.prob - maxProb) / TEMPERATURE));
  const sumExp = expProbs.reduce((a, b) => a + b, 0);
  const probs = expProbs.map(e => e / sumExp);

  const rand = Math.random();
  let cum = 0;
  for (let i = 0; i < topK.length; i++) {
    cum += probs[i];
    if (rand <= cum) return topK[i];
  }
  return topK[0];
}

async function aiMakeMove() {
  if (gameState !== 'PLAYING' || currentPlayer !== WHITE) return;
  aiThinking = true;
  updateUI();
  setStatus('AI 思考中...');

  try {
    const move = await aiGetMove();

    if (move.row === -1) {
      consecutivePasses++;
      moveHistory.push({ row: -1, col: -1, color: WHITE, captures: [], prevBoard: cloneBoard(board), prevKoPoint: koPoint ? {...koPoint} : null });
      setStatus('白棋 pass');
    } else {
      const captured = executeMove(move.row, move.col, WHITE);
      consecutivePasses = 0;
      setStatus(captured.length > 0 ? `白棋落子，提走 ${captured.length} 子` : '白棋落子');
    }

    currentPlayer = BLACK;
    aiThinking = false;
    drawBoard();
    updateUI();

    if (consecutivePasses >= 2) endGame();
  } catch (err) {
    console.error('AI error:', err);
    aiThinking = false;
    updateUI();
    setStatus('AI 出错，请尝试手动落子');
  }
}

// ===== Fallback MCTS Engine =====
let mctsWorker = null;

function initMCTSEngine() {
  const workerCode = `
    const BOARD_SIZE = 19;
    const EMPTY = 0, BLACK = 1, WHITE = 2;

    function isValidMove(board, row, col, color) {
      if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return false;
      if (board[row][col] !== EMPTY) return false;

      const prev = board.map(r => [...r]);
      board[row][col] = color;

      for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nr = row + dr, nc = col + dc;
        if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr][nc] === (color === BLACK ? WHITE : BLACK)) {
          const group = getGroup(board, nr, nc);
          if (countLiberties(board, group) === 0) {
            for (const [gr,gc] of group) board[gr][gc] = EMPTY;
          }
        }
      }
      const myGroup = getGroup(board, row, col);
      const alive = countLiberties(board, myGroup) > 0;

      for (let r = 0; r < BOARD_SIZE; r++)
        for (let c = 0; c < BOARD_SIZE; c++)
          board[r][c] = prev[r][c];
      return alive;
    }

    function getGroup(board, row, col) {
      const color = board[row][col];
      if (color === EMPTY) return [];
      const group = [];
      const visited = new Set();
      const stack = [[row, col]];
      while (stack.length > 0) {
        const [r,c] = stack.pop();
        const key = r * BOARD_SIZE + c;
        if (visited.has(key)) continue;
        visited.add(key);
        group.push([r,c]);
        for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE &&
              board[nr][nc] === color && !visited.has(nr * BOARD_SIZE + nc)) {
            stack.push([nr, nc]);
          }
        }
      }
      return group;
    }

    function countLiberties(board, group) {
      const liberties = new Set();
      for (const [r,c] of group) {
        for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr][nc] === EMPTY) {
            liberties.add(nr * BOARD_SIZE + nc);
          }
        }
      }
      return liberties.size;
    }

    function fastPlayout(board, startColor) {
      const b = board.map(r => [...r]);
      let color = startColor;
      // Pre-build empty cell list and maintain it
      const emptySet = new Set();
      for (let r = 0; r < BOARD_SIZE; r++)
        for (let c = 0; c < BOARD_SIZE; c++)
          if (b[r][c] === EMPTY) emptySet.add(r * BOARD_SIZE + c);

      const emptyArr = () => [...emptySet];

      for (let n = 0; n < 100 && emptySet.size > 0; n++) {
        const cells = emptyArr();
        const cell = cells[Math.floor(Math.random() * cells.length)];
        const mr = Math.floor(cell / BOARD_SIZE);
        const mc = cell % BOARD_SIZE;

        // Check trivial: occupied
        if (b[mr][mc] !== EMPTY) continue;

        // Quick suicide check: count adjacent empty cells
        let adjEmpty = 0;
        for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const nr = mr + dr, nc = mc + dc;
          if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && b[nr][nc] === EMPTY) {
            adjEmpty++;
          }
        }

        b[mr][mc] = color;
        emptySet.delete(cell);

        // Remove captured opponent groups
        const opp = color === BLACK ? WHITE : BLACK;
        let captured = false;
        for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const nr = mr + dr, nc = mc + dc;
          if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && b[nr][nc] === opp) {
            const grp = getGroup(b, nr, nc);
            if (countLiberties(b, grp) === 0) {
              captured = true;
              for (const [gr,gc] of grp) {
                b[gr][gc] = EMPTY;
                emptySet.add(gr * BOARD_SIZE + gc);
              }
            }
          }
        }

        // Check suicide after captures
        if (!captured && adjEmpty === 0) {
          // Self-capture: check if own group has liberties
          const myGroup = getGroup(b, mr, mc);
          if (countLiberties(b, myGroup) === 0) {
            b[mr][mc] = EMPTY;
            emptySet.add(cell);
          }
        }

        color = opp;
      }

      let black = 0, white = 0;
      for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
          if (b[r][c] === BLACK) black++;
          else if (b[r][c] === WHITE) white++;
        }
      }
      return black > white ? BLACK : WHITE;
    }

    self.onmessage = function(e) {
      const { board, color, numSims } = e.data;
      const moves = [];
      for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
          if (board[r][c] === EMPTY && isValidMove(board, r, c, color)) {
            moves.push([r, c]);
          }
        }
      }

      if (moves.length === 0) {
        self.postMessage({ row: -1, col: -1 });
        return;
      }

      const results = [];
      // Use fewer sims per move, but minimum 5
      const simsPerMove = Math.max(5, Math.floor(numSims / moves.length));

      for (const [r, c] of moves) {
        const b = board.map(row => [...row]);
        b[r][c] = color;
        let wins = 0;
        for (let i = 0; i < simsPerMove; i++) {
          if (fastPlayout(b, color === BLACK ? WHITE : BLACK) === color) wins++;
        }
        results.push({ row: r, col: c, wins, sims: simsPerMove });
      }

      results.sort((a, b) => (b.wins / b.sims) - (a.wins / a.sims));
      self.postMessage({ row: results[0].row, col: results[0].col });
    };
  `;

  const blob = new Blob([workerCode], { type: 'application/javascript' });
  mctsWorker = new Worker(URL.createObjectURL(blob));
}

function aiGetMoveMCTS() {
  return new Promise((resolve) => {
    mctsWorker.onmessage = function(e) {
      resolve(e.data);
    };
    mctsWorker.postMessage({
      board,
      color: WHITE,
      numSims: 12000
    });
  });
}

function handlePlayerMove(row, col) {
  if (gameState !== 'PLAYING') return;
  if (currentPlayer !== BLACK) return;
  if (aiThinking) return;

  if (!isValidMove(row, col, BLACK)) {
    setStatus('此处不可落子');
    return;
  }

  const captured = executeMove(row, col, BLACK);
  consecutivePasses = 0;
  currentPlayer = WHITE;
  drawBoard();
  updateUI();
  setStatus(captured.length > 0
    ? `提走 ${captured.length} 子`
    : `黑棋落子 (${row},${col})`);

  // Trigger AI
  setTimeout(() => aiMakeMove(), 100);
}

function handlePass() {
  if (gameState !== 'PLAYING' || currentPlayer !== BLACK || aiThinking) return;

  consecutivePasses++;
  moveHistory.push({ row: -1, col: -1, color: BLACK, captures: [], prevBoard: cloneBoard(board), prevKoPoint: koPoint ? {...koPoint} : null });
  currentPlayer = WHITE;
  updateUI();
  setStatus('黑棋 pass');

  if (consecutivePasses >= 2) {
    endGame();
    return;
  }

  setTimeout(() => aiMakeMove(), 100);
}

function handleResign() {
  if (gameState !== 'PLAYING') return;
  gameState = 'SCORING';
  updateUI();
  setStatus('黑棋认输，白棋胜！');
}

function handleUndo() {
  if (gameState !== 'PLAYING' || currentPlayer !== BLACK || aiThinking) return;
  if (moveHistory.length < 2) return;

  undoLastTwoMoves();
  consecutivePasses = 0;
  currentPlayer = BLACK;
  drawBoard();
  updateUI();
  setStatus('已悔棋');
}

function handleNewGame() {
  board = Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(EMPTY));
  moveHistory = [];
  currentPlayer = BLACK;
  gameState = 'PLAYING';
  captures = { [BLACK]: 0, [WHITE]: 0 };
  lastMove = null;
  koPoint = null;
  consecutivePasses = 0;
  aiThinking = false;

  document.getElementById('scorePanel').style.display = 'none';
  drawBoard();
  updateUI();
  setStatus('新局开始 — 您执黑先手');
}

// Territory estimation using flood-fill heuristic
function estimateTerritory() {
  const result = calculateTerritory();
  showTerritoryEstimate(result);
}

function showTerritoryEstimate(result) {
  const diff = result.blackScore - result.whiteScore;
  const winner = diff > 0 ? '黑棋' : '白棋';
  const margin = Math.abs(diff).toFixed(1);

  document.getElementById('scoreContent').innerHTML = `
    <div class="score-row"><span>黑棋估算</span><span>${result.blackScore.toFixed(1)} 子</span></div>
    <div class="score-row"><span>白棋估算</span><span>${result.whiteScore.toFixed(1)} 子</span></div>
    <div class="winner">${winner}优势约 ${margin} 子</div>
  `;
  document.getElementById('scorePanel').style.display = 'block';
}

// Override estimateTerritory to try neural network first if available
const originalEstimateTerritory = estimateTerritory;
estimateTerritory = async function() {
  if (!aiModel) {
    originalEstimateTerritory();
    return;
  }

  const myColor = BLACK;
  const oppColor = WHITE;
  const input = new Float32Array(3 * BOARD_SIZE * BOARD_SIZE);

  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const idx = r * BOARD_SIZE + c;
      input[idx] = board[r][c] === myColor ? 1 : 0;
      input[BOARD_SIZE * BOARD_SIZE + idx] = board[r][c] === oppColor ? 1 : 0;
      input[2 * BOARD_SIZE * BOARD_SIZE + idx] = board[r][c] === EMPTY ? 1 : 0;
    }
  }

  try {
    const tensor = tf.tensor4d(input, [1, BOARD_SIZE, BOARD_SIZE, 3]);
    const output = aiModel.predict(tensor);
    const data = output.dataSync();
    const valueHead = data[data.length - 1];
    tensor.dispose();
    output.dispose();

    const estimatedDiff = valueHead * 120;
    const komi = 7.5;
    const blackEst = (BOARD_SIZE * BOARD_SIZE + estimatedDiff) / 2;
    const whiteEst = blackEst - estimatedDiff + komi;

    showTerritoryEstimate({
      blackScore: blackEst,
      whiteScore: whiteEst,
      blackTerritory: 0,
      whiteTerritory: 0,
      territory: Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(null))
    });
  } catch (err) {
    console.warn('Neural territory estimation failed, using heuristic:', err.message);
    originalEstimateTerritory();
  }
};

// Auto-load AI model on page load
loadAIModel();

// ===== Click handler =====
canvas.addEventListener('click', (e) => {
  if (gameState !== 'PLAYING' || currentPlayer !== BLACK || aiThinking) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const pos = pixelToBoard(px, py);
  if (!pos) return;
  handlePlayerMove(pos.row, pos.col);
});

// Touch support for mobile
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState !== 'PLAYING' || currentPlayer !== BLACK || aiThinking) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const touch = e.touches[0];
  const px = (touch.clientX - rect.left) * scaleX;
  const py = (touch.clientY - rect.top) * scaleY;
  const pos = pixelToBoard(px, py);
  if (!pos) return;
  handlePlayerMove(pos.row, pos.col);
}, { passive: false });

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'p' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); handlePass(); }
  if (e.key === 'u' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); handleUndo(); }
  if (e.key === 'n' && !e.ctrlKey && !e.metaKey && !aiThinking) { e.preventDefault(); handleNewGame(); }
});

// ===== Button bindings =====
document.getElementById('btnPass').addEventListener('click', handlePass);
document.getElementById('btnResign').addEventListener('click', handleResign);
document.getElementById('btnUndo').addEventListener('click', handleUndo);
document.getElementById('btnNew').addEventListener('click', handleNewGame);
document.getElementById('btnScore').addEventListener('click', async () => {
  if (gameState !== 'PLAYING' || currentPlayer !== BLACK || aiThinking) return;
  setStatus('分析中...');
  await estimateTerritory();
  setStatus('形势判断完成');
});

// Initial UI update
updateUI();
setStatus('点击"新局"开始对局');

runTests();
</script>

</body>
</html>
